<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNION STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.25s ease-in-out; }
        .slide-up { animation: slideUp 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .modal-overlay { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen w-screen overflow-hidden flex flex-col">

    <div id="toast-container" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center pointer-events-none gap-2 px-4"></div>
    
    <div id="app-container" class="w-full h-full flex flex-col relative overflow-hidden">
        <div class="flex-1 flex flex-col items-center justify-center text-gray-400 text-xs space-y-2">
            <i class="fas fa-spinner fa-spin text-2xl text-blue-500"></i>
            <p>Connecting to Realtime Cloud Database...</p>
        </div>
    </div>

    <!-- Firebase SDK Imports & Realtime Sync Engine -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue, update, remove, push, child } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken,
            getDatabase, ref, set, get, onValue, update, remove, push, child
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'union-store-realtime-v1';
        window.appId = appId;
        
        // Uses environment config if available, otherwise initialized cleanly for production realtime sync
        const firebaseConfig = {
  apiKey: "AIzaSyDYoRm5kIpVw_3m_p5-1vMKF-43n9L_PVE",
  authDomain: "union-cd417.firebaseapp.com",
  databaseURL: "https://union-cd417-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "union-cd417",
  storageBucket: "union-cd417.firebasestorage.app",
  messagingSenderId: "989167269058",
  appId: "1:989167269058:web:586c3dacb891f7d3caf75b",
  measurementId: "G-Q25HH4RP9N"
};

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const rtdb = getDatabase(app);
            window.rtdb = rtdb;
            window.auth = auth;

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.warn("Auth warning, fallback active:", e);
                }
            };

            initAuth().then(() => {
                if (window.startRealtimeApp) window.startRealtimeApp();
            }).catch(() => {
                if (window.startFallbackApp) window.startFallbackApp();
            });
        } catch (err) {
            console.warn("Firebase Realtime failed, running fallback storage:", err);
            if (window.startFallbackApp) window.startFallbackApp();
        }
    </script>

    <script>
        let rtdb = null;
        let auth = null;
        let appId = 'union-store-realtime-v1';
        let isCloudMode = false;
        
        let currentUser = JSON.parse(localStorage.getItem('union_current_user') || 'null');
        let currentTab = 'store';
        let selectedStoreCategory = null;
        let currentCheckout = {};

        // Complete Realtime Data Store Model
        window.cloudData = {
            settings: JSON.parse(localStorage.getItem('union_settings') || JSON.stringify({ upiId: '9279500979@fam' })),
            users: JSON.parse(localStorage.getItem('union_users') || JSON.stringify([{ id: '1', username: 'ownerxunion', password: '@manxunion', role: 'owner', balance: 0 }])),
            products: JSON.parse(localStorage.getItem('union_products') || JSON.stringify([
                { id: 'p1', name: 'Reaper X Pro', category: 'android_root', plans: [
                    { duration: '1 Day', price: 89, resellerPrice: 70, stock: 100 },
                    { duration: '10 Days', price: 349, resellerPrice: 280, stock: 100 },
                    { duration: '20 Days', price: 599, resellerPrice: 480, stock: 100 },
                    { duration: '31 Days', price: 799, resellerPrice: 650, stock: 100 }
                ]},
                { id: 'p2', name: 'Drip Client', category: 'android_non_root', plans: [
                    { duration: '1 Day', price: 79, resellerPrice: 60, stock: 100 },
                    { duration: '3 Days', price: 179, resellerPrice: 140, stock: 100 },
                    { duration: '7 Days', price: 349, resellerPrice: 280, stock: 100 },
                    { duration: '15 Days', price: 599, resellerPrice: 480, stock: 100 },
                    { duration: '30 Days', price: 899, resellerPrice: 700, stock: 100 }
                ]},
                { id: 'p3', name: 'MIGUL - Monite iOS [PRO]', category: 'ios', plans: [
                    { duration: '1 Day', price: 299, resellerPrice: 250, stock: 100 },
                    { duration: '7 Days', price: 899, resellerPrice: 750, stock: 100 },
                    { duration: '31 Days', price: 1699, resellerPrice: 1400, stock: 100 }
                ]}
            ])),
            orders: JSON.parse(localStorage.getItem('union_orders') || '[]'),
            balance_reqs: JSON.parse(localStorage.getItem('union_balance_reqs') || '[]'),
            announcements: JSON.parse(localStorage.getItem('union_announcements') || JSON.stringify([{ id: 'a1', text: 'Welcome to UNION STORE! Realtime cloud sync active.', date: new Date().toISOString() }])),
            files: JSON.parse(localStorage.getItem('union_files') || JSON.stringify([{ id: 'f1', name: 'Reaper X Latest APK', version: 'v2.0', link: '#' }])),
            coupons: JSON.parse(localStorage.getItem('union_coupons') || JSON.stringify([{ id: 'c1', code: 'WELCOME10', discount: 10 }])),
            support: JSON.parse(localStorage.getItem('union_support') || JSON.stringify({ telegram: '@ownerxunion_support', whatsapp: '+919279500979', message: 'For quick support or custom panel solutions, contact us via Telegram or WhatsApp anytime.' }))
        };

        const saveToLocalStorage = () => {
            localStorage.setItem('union_settings', JSON.stringify(window.cloudData.settings));
            localStorage.setItem('union_users', JSON.stringify(window.cloudData.users));
            localStorage.setItem('union_products', JSON.stringify(window.cloudData.products));
            localStorage.setItem('union_orders', JSON.stringify(window.cloudData.orders));
            localStorage.setItem('union_balance_reqs', JSON.stringify(window.cloudData.balance_reqs));
            localStorage.setItem('union_announcements', JSON.stringify(window.cloudData.announcements));
            localStorage.setItem('union_files', JSON.stringify(window.cloudData.files));
            localStorage.setItem('union_coupons', JSON.stringify(window.cloudData.coupons));
            localStorage.setItem('union_support', JSON.stringify(window.cloudData.support));
        };

        const showToast = (msg, type = 'info') => {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            const colorClass = type === 'success' ? 'bg-green-600 shadow-green-900/30' : type === 'error' ? 'bg-red-600 shadow-red-900/30' : 'bg-blue-600 shadow-blue-900/30';
            toast.className = `${colorClass} text-white px-4 py-2.5 rounded-2xl shadow-xl text-xs font-bold slide-up flex items-center gap-2 border border-white/10`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'} text-sm"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-15px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);
        const formatDate = (isoString) => new Date(isoString).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        window.startFallbackApp = function() {
            isCloudMode = false;
            console.warn("Running UNION STORE in Local Memory Fallback Mode");
            refreshUserData();
            render();
        };

        window.startRealtimeApp = function() {
            rtdb = window.rtdb;
            auth = window.auth;
            appId = window.appId;
            const { ref, get, set, onValue } = window.firebaseModules;

            const rootRef = ref(rtdb, 'artifacts/' + appId + '/store_data');

            // Initial check & seed default database if empty
            get(rootRef).then((snapshot) => {
                if (!snapshot.exists()) {
                    set(rootRef, window.cloudData).then(() => {
                        console.log("Database seeded successfully");
                    }).catch(err => console.warn("Seed error:", err));
                }
            }).catch(err => console.warn("Read error:", err));

            // Real-time synchronization listener for all nodes
            onValue(rootRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    window.cloudData = {
                        settings: data.settings || window.cloudData.settings,
                        users: data.users || window.cloudData.users,
                        products: data.products || window.cloudData.products,
                        orders: data.orders ? Object.values(data.orders) : [],
                        balance_reqs: data.balance_reqs ? Object.values(data.balance_reqs) : [],
                        announcements: data.announcements ? Object.values(data.announcements) : [],
                        files: data.files ? Object.values(data.files) : [],
                        coupons: data.coupons ? Object.values(data.coupons) : [],
                        support: data.support || window.cloudData.support
                    };
                    saveToLocalStorage();
                    isCloudMode = true;
                    refreshUserData();
                    render();
                }
            }, (error) => {
                console.warn("Realtime listener error, switching to fallback:", error);
                window.startFallbackApp();
            });
        };

        // Realtime Cloud Operations Engine
        const CloudDB = {
            getSettings: () => window.cloudData.settings,
            updateSettings: async (settings) => {
                window.cloudData.settings = settings;
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/settings'), settings);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getUsers: () => window.cloudData.users,
            updateUsers: async (usersList) => {
                window.cloudData.users = usersList;
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/users'), usersList);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getProducts: () => window.cloudData.products,
            updateProducts: async (prodsList) => {
                window.cloudData.products = prodsList;
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/products'), prodsList);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getOrders: () => window.cloudData.orders,
            addOrder: async (order) => {
                window.cloudData.orders.push(order);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/orders/' + order.id), order);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            updateOrder: async (id, updatedFields) => {
                const o = window.cloudData.orders.find(x => x.id === id);
                if(o) Object.assign(o, updatedFields);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, update } = window.firebaseModules;
                        await update(ref(rtdb, 'artifacts/' + appId + '/store_data/orders/' + id), updatedFields);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getBalanceReqs: () => window.cloudData.balance_reqs,
            addBalanceReq: async (req) => {
                window.cloudData.balance_reqs.push(req);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/balance_reqs/' + req.id), req);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            updateBalanceReq: async (id, updatedFields) => {
                const r = window.cloudData.balance_reqs.find(x => x.id === id);
                if(r) Object.assign(r, updatedFields);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, update } = window.firebaseModules;
                        await update(ref(rtdb, 'artifacts/' + appId + '/store_data/balance_reqs/' + id), updatedFields);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getAnnouncements: () => window.cloudData.announcements,
            addAnnouncement: async (ann) => {
                window.cloudData.announcements.unshift(ann);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/announcements/' + ann.id), ann);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            deleteAnnouncement: async (id) => {
                window.cloudData.announcements = window.cloudData.announcements.filter(x => x.id !== id);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, remove } = window.firebaseModules;
                        await remove(ref(rtdb, 'artifacts/' + appId + '/store_data/announcements/' + id));
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getFiles: () => window.cloudData.files,
            addFile: async (file) => {
                window.cloudData.files.unshift(file);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/files/' + file.id), file);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            deleteFile: async (id) => {
                window.cloudData.files = window.cloudData.files.filter(x => x.id !== id);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, remove } = window.firebaseModules;
                        await remove(ref(rtdb, 'artifacts/' + appId + '/store_data/files/' + id));
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getCoupons: () => window.cloudData.coupons,
            addCoupon: async (coup) => {
                window.cloudData.coupons.push(coup);
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/coupons/' + coup.id), coup);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            },
            getSupport: () => window.cloudData.support,
            updateSupport: async (sup) => {
                window.cloudData.support = sup;
                saveToLocalStorage();
                if(isCloudMode && rtdb) {
                    try {
                        const { ref, set } = window.firebaseModules;
                        await set(ref(rtdb, 'artifacts/' + appId + '/store_data/support'), sup);
                    } catch(e) { console.warn("Sync failed:", e); }
                }
            }
        };

        const refreshUserData = () => {
            if(!currentUser) return;
            const users = CloudDB.getUsers();
            const fresh = users.find(u => u.id === currentUser.id);
            if(fresh) {
                currentUser = fresh;
                localStorage.setItem('union_current_user', JSON.stringify(currentUser));
            }
        };

        const setTab = (tab) => {
            currentTab = tab;
            render();
        };

        const openModal = (htmlContent) => {
            closeModal();
            const modal = document.createElement('div');
            modal.id = 'dynamic-modal';
            modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4 fade-in';
            modal.innerHTML = `
                <div class="absolute inset-0 modal-overlay" onclick="closeModal()"></div>
                <div class="bg-gray-900 border border-gray-700/85 rounded-3xl shadow-2xl w-full max-w-md relative z-10 slide-up max-h-[85vh] overflow-y-auto overflow-x-hidden">
                    ${htmlContent}
                </div>
            `;
            document.body.appendChild(modal);
        };

        const closeModal = () => {
            const modal = document.getElementById('dynamic-modal');
            if(modal) modal.remove();
        };

        const login = (e) => {
            e.preventDefault();
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const users = CloudDB.getUsers();
            const user = users.find(x => x.username === u && x.password === p);
            if (user) {
                currentUser = user;
                localStorage.setItem('union_current_user', JSON.stringify(user));
                showToast('Welcome back, ' + user.username + '!', 'success');
                currentTab = 'store';
                render();
            } else {
                showToast('Invalid Username or Password', 'error');
            }
        };

        const register = async (e) => {
            e.preventDefault();
            const u = document.getElementById('reg-user').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!u || !p) return showToast('Please enter username & password', 'error');
            
            const users = CloudDB.getUsers();
            if(users.find(x => x.username.toLowerCase() === u.toLowerCase())) {
                return showToast('Username already exists', 'error');
            }
            
            const newUser = { id: generateId(), username: u, password: p, role: 'buyer', balance: 0 };
            users.push(newUser);
            await CloudDB.updateUsers(users);
            currentUser = newUser;
            localStorage.setItem('union_current_user', JSON.stringify(newUser));
            showToast('Account Created Successfully!', 'success');
            currentTab = 'store';
            render();
        };

        const logout = () => {
            currentUser = null;
            localStorage.removeItem('union_current_user');
            currentTab = 'store';
            render();
        };

        const showForgotPasswordModal = () => {
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm"><i class="fas fa-key text-blue-400 mr-2"></i> Reset Account Password</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <p class="text-[11px] text-gray-400 leading-relaxed">Enter your registered username and your new password to update cloud credentials.</p>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                        <input type="text" id="fp-user" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-xs" placeholder="Your username">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">New Password</label>
                        <input type="password" id="fp-newpass" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-xs" placeholder="New secure password">
                    </div>
                    <button onclick="resetPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform text-xs uppercase tracking-wider">Update Password</button>
                </div>
            `);
        };

        const resetPassword = async () => {
            const u = document.getElementById('fp-user').value.trim();
            const p = document.getElementById('fp-newpass').value.trim();
            if(!u || !p) return showToast('Please fill all fields', 'error');

            const users = CloudDB.getUsers();
            const idx = users.findIndex(x => x.username === u);
            if(idx === -1) return showToast('Username not found', 'error');

            users[idx].password = p;
            await CloudDB.updateUsers(users);
            closeModal();
            showToast('Password updated! Please login.', 'success');
        };

        const renderStore = () => {
            const products = CloudDB.getProducts();
            const getIcon = (cat) => {
                if(cat.includes('root')) return '<i class="fab fa-android text-green-500"></i>';
                if(cat === 'ios') return '<i class="fab fa-apple text-gray-200"></i>';
                return '<i class="fas fa-key text-blue-400"></i>';
            };

            if (!selectedStoreCategory) {
                return `
                <div class="space-y-6 fade-in pb-24 max-w-xl mx-auto pt-2">
                    <div class="text-center space-y-1">
                        <h2 class="text-2xl font-black text-white tracking-wide">UNION STORE</h2>
                        <p class="text-xs text-gray-400">Select your required panel category to explore live cloud licenses</p>
                    </div>

                    <div class="grid grid-cols-1 gap-3.5 pt-2">
                        <div onclick="setStoreCategory('android_root')" class="bg-gray-900 border border-gray-800 hover:border-green-500 p-5 rounded-3xl flex items-center justify-between cursor-pointer transition-all group shadow-lg">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-green-900/20 border border-green-800/60 flex items-center justify-center text-green-400 text-xl group-hover:scale-110 transition-transform">
                                    <i class="fab fa-android"></i>
                                </div>
                                <div>
                                    <h3 class="text-base font-bold text-white group-hover:text-green-400 transition-colors">Root Panel</h3>
                                    <p class="text-[11px] text-gray-400 mt-0.5">High-performance root licenses & cheats</p>
                                </div>
                            </div>
                            <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 group-hover:bg-green-600 group-hover:text-white transition-all text-xs">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>

                        <div onclick="setStoreCategory('android_non_root')" class="bg-gray-900 border border-gray-800 hover:border-blue-500 p-5 rounded-3xl flex items-center justify-between cursor-pointer transition-all group shadow-lg">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-blue-900/20 border border-blue-800/60 flex items-center justify-center text-blue-400 text-xl group-hover:scale-110 transition-transform">
                                    <i class="fab fa-android"></i>
                                </div>
                                <div>
                                    <h3 class="text-base font-bold text-white group-hover:text-blue-400 transition-colors">Non Root Panel</h3>
                                    <p class="text-[11px] text-gray-400 mt-0.5">Safe non-root client tools and licenses</p>
                                </div>
                            </div>
                            <div class="w-9 h-9 rounded-full bg-gray-800 flex items-center justify-center text-gray-400 group-hover:bg-blue-600 group-hover:text-white transition-all text-xs">
                                <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>

                        <div onclick="setStoreCategory('ios')" class="bg-gray-900 border border-gray-800 hover:border-purple-500 p-5 rounded-3xl flex items-center justify-between cursor-pointer transition-all group shadow-lg">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-purple-900/20 border border-purple-800/60 flex items-center justify-center text-purple-400 text-xl group-hover:scale-110 transition-transform">
                                    <i class="fab fa-apple"></i>
                                </div>
                                <div>

            const codeInput = document.getElementById('coupon-input');

            const coupons = CloudDB.getCoupons();
            const coupon = coupons.find(c => c.code === code);
            
            if(coupon) {
                const discountAmt = Math.round(currentCheckout.basePrice * (coupon.discount / 100));
                currentCheckout.discount = discountAmt;
                currentCheckout.finalPrice = Math.max(0, currentCheckout.basePrice - discountAmt);
                showToast(`Coupon applied! ${coupon.discount}% off`, 'success');
                renderCheckoutModal();
            } else {
                showToast('Invalid Coupon Code', 'error');
            }
        };

        const confirmPurchase = async () => {
            const { product, plan, finalPrice, method, basePrice } = currentCheckout;
            const buyerPriceOriginal = plan.price;
            
            let utr = '';
            if (method === 'upi') {
                const utrInput = document.getElementById('checkout-utr');
                utr = utrInput ? utrInput.value.trim() : '';
                if(!utr || utr.length < 8) return showToast('Please enter a valid UTR number', 'error');
            } else if (method === 'balance') {
                if(currentUser.balance < finalPrice) return showToast('Insufficient Wallet Balance', 'error');
            }

            const products = CloudDB.getProducts();
            const pIdx = products.findIndex(p => p.id === product.id);
            if(pIdx === -1) return showToast('Product not found', 'error');
            const planIdx = products[pIdx].plans.findIndex(pl => pl.duration === plan.duration);
            if(planIdx === -1) return showToast('Plan not found', 'error');
            
            if (products[pIdx].plans[planIdx].stock <= 0) {
                return showToast('Selected plan is currently out of stock!', 'error');
            }

            const newOrder = {
                id: generateId(),
                userId: currentUser.id,
                username: currentUser.username,
                roleAtPurchase: currentUser.role,
                productName: product.name,
                plan: plan.duration,
                price: finalPrice,
                originalPrice: buyerPriceOriginal,
                method,
                utr,
                status: 'pending',
                key: 'Waiting for Owner Approval & Key Delivery',
                date: new Date().toISOString()
            };

            if(method === 'balance') {
                const users = CloudDB.getUsers();
                const uIdx = users.findIndex(u => u.id === currentUser.id);
                if(uIdx > -1) {
                    users[uIdx].balance -= finalPrice;
                    await CloudDB.updateUsers(users);
                    refreshUserData();
                }
            }

            products[pIdx].plans[planIdx].stock -= 1;
            await CloudDB.updateProducts(products);
            await CloudDB.addOrder(newOrder);

            closeModal();
            showToast('Order placed successfully! Waiting for owner review & key delivery.', 'success');
            render();
        };

        const renderHistory = () => {
            let orders = CloudDB.getOrders();
            if(currentUser.role !== 'owner') {
                orders = orders.filter(o => o.userId === currentUser.id);

            orders = [...orders].reverse();

            let html = `<div class="space-y-4 fade-in pb-24 max-w-2xl mx-auto">

                        <p class="text-gray-500 text-xs">No purchase history found.</p>
                    </div>
                ` : orders.map(o => {
                    const isApproved = o.status === 'approved';
                    let profitHtml = '';

                        const profit = o.originalPrice - o.price;
                        if(profit > 0) {
                            profitHtml = `<div class="text-[10px] text-green-400 font-bold bg-green-900/20 px-2.5 py-1 rounded-lg inline-block mt-2 border border-green-800/40">Reseller Profit Made: ₹${profit}</div>`;
                        }
                    }

                    return `
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-sm relative overflow-hidden">

                    <div class="pt-2">

        const showAddBalanceModal = () => {
            const settings = CloudDB.getSettings();
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">

                        <p class="text-[11px] text-blue-200 mb-2">Pay on this UPI ID and submit your UTR for owner approval. Minimum is ₹10.</p>
                        <div class="flex justify-between items-center bg-gray-950 p-3 rounded-xl border border-gray-800">

                            <button onclick="document.execCommand('copy'); navigator.clipboard.writeText('${settings.upiId}'); showToast('UPI Copied!', 'success');" class="text-blue-400 text-[10px] font-bold uppercase"><i class="fas fa-copy mr-1"></i> Copy</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Amount Paid (₹)</label>
                        <input type="number" id="add-amt" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-xs" placeholder="e.g. 500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">12-Digit UTR / Ref Number</label>
                        <input type="text" id="add-utr" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-xs" placeholder="e.g. 312345678901">
                    </div>
                    <button onclick="submitBalanceReq()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform text-xs uppercase tracking-wider">Submit Request for Approval</button>
                </div>
            `);
        };

        const submitBalanceReq = async () => {
            const amtInput = document.getElementById('add-amt');
            const utrInput = document.getElementById('add-utr');
            if(!amtInput || !utrInput) return;
            const amt = parseInt(amtInput.value);
            const utr = utrInput.value.trim();
            if(!amt || amt < 10) return showToast('Enter valid amount (Min 10)', 'error');
            if(!utr || utr.length < 8) return showToast('Enter valid UTR', 'error');

            const newReq = { id: generateId(), userId: currentUser.id, username: currentUser.username, amount: amt, utr, status: 'pending', date: new Date().toISOString() };
            await CloudDB.addBalanceReq(newReq);
            closeModal();

            const balInput = document.getElementById('cu-bal');
            if(!nameInput || !passInput) return;

            const username = nameInput.value.trim();
            const password = passInput.value.trim();
            const role = roleInput ? roleInput.value : 'buyer';
            const balance = parseInt(balInput ? balInput.value : 0) || 0;

            if(!username || !password) return showToast('Username and password required', 'error');

            const users = CloudDB.getUsers();
            if(users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
                return showToast('Username already exists', 'error');
            }

            users.push({ id: generateId(), username, password, role, balance });
            await CloudDB.updateUsers(users);
            closeModal();
            showToast(`${role.toUpperCase()} account created successfully!`, 'success');
        };

            const customKey = keyInput.value.trim();
            if(!customKey) return showToast('Please enter the license key to deliver', 'error');

            await CloudDB.updateOrder(id, { status: 'approved', key: customKey });
            showToast('Order approved and license key delivered!', 'success');
        };

            await CloudDB.updateOrder(id, { status: 'rejected', key: 'Rejected by Owner' });

            const reqs = CloudDB.getBalanceReqs();
            const req = reqs.find(r => r.id === id);
            if(req && req.status === 'pending') {
                await CloudDB.updateBalanceReq(id, { status: 'approved' });

                const users = CloudDB.getUsers();
                const uIdx = users.findIndex(u => u.id === req.userId);
                if(uIdx > -1) {
                    users[uIdx].balance += req.amount;
                    await CloudDB.updateUsers(users);
                }
                showToast(`Credited ₹${req.amount} to ${req.username}`, 'success');
            }
        };

            showToast('Balance Request Rejected', 'error');

            const users = CloudDB.getUsers();
            const u = users.find(x => x.id === userId);
            if(u) {
                u.role = u.role === 'buyer' ? 'reseller' : 'buyer';
                await CloudDB.updateUsers(users);
                showToast(`Role changed to ${u.role}`, 'success');
            }

            openModal(`

                    <button onclick="saveUserBalance('${u.id}')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg text-xs uppercase tracking-wider">Save Balance</button>

            const users = CloudDB.getUsers();
            const uIdx = users.findIndex(x => x.id === userId);
            if(uIdx > -1) {
                users[uIdx].balance = parseInt(val);
                await CloudDB.updateUsers(users);
                closeModal();
                showToast('Balance updated', 'success');

            html += `</div>
                <div class="p-4 border-t border-gray-800 bg-gray-900 rounded-b-3xl">
                    <button onclick="saveProducts()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg text-xs uppercase tracking-wider">Save All Product Changes</button>
                </div>
            `;
            openModal(html);
        };

        const openNewProductDialog = () => {
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm">Create New Product</h3>
                    <button onclick="openProductsModal()" class="text-gray-400 hover:text-white p-1"><i class="fas fa-arrow-left"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1">Product Name</label>
                        <input type="text" id="np-name" placeholder="e.g. Reaper X Pro" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none text-xs font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1">Category</label>
                        <select id="np-cat" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none text-xs">
                            <option value="android_root">Root Panel</option>
                            <option value="android_non_root">Non Root Panel</option>
                            <option value="ios">IOS Panel</option>
                        </select>
                    </div>
                    <div class="border-t border-gray-800 pt-3">
                        <label class="text-[10px] font-bold text-blue-400 block mb-2 uppercase tracking-wider">Initial Plan Setup</label>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] text-gray-400 block mb-1">Duration Title (e.g. 30 Days)</label>
                                <input type="text" id="np-duration" value="30 Days" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-white text-xs font-bold focus:outline-none">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div><label class="text-[10px] text-gray-400 block mb-1">Buyer ₹</label><input type="number" id="np-price" value="799" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-2.5 text-white text-xs focus:outline-none"></div>
                                <div><label class="text-[10px] text-gray-400 block mb-1">Reseller ₹</label><input type="number" id="np-reseller" value="650" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-2.5 text-white text-xs focus:outline-none"></div>
                                <div><label class="text-[10px] text-gray-400 block mb-1">Stock</label><input type="number" id="np-stock" value="100" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-2.5 text-white text-xs focus:outline-none"></div>
                            </div>
                        </div>
                    </div>
                    <button onclick="createNewProduct()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg mt-1 text-xs uppercase tracking-wider">Create Product</button>
                </div>
            `);
        };

        const createNewProduct = async () => {
            const nameInput = document.getElementById('np-name');
            const catInput = document.getElementById('np-cat');
            const durInput = document.getElementById('np-duration');
            const priceInput = document.getElementById('np-price');
            const resellerInput = document.getElementById('np-reseller');
            const stockInput = document.getElementById('np-stock');
            if(!nameInput) return;

            const name = nameInput.value.trim();
            const cat = catInput ? catInput.value : 'android_root';
            const duration = durInput ? durInput.value.trim() || '30 Days' : '30 Days';
            const price = parseInt(priceInput ? priceInput.value : 799) || 799;
            const resellerPrice = parseInt(resellerInput ? resellerInput.value : 650) || 650;
            const stock = parseInt(stockInput ? stockInput.value : 100) || 100;

            if(!name) return showToast('Product name is required', 'error');
            
            const products = CloudDB.getProducts();
            products.unshift({
                id: generateId(),
                name: name,
                category: cat,
                plans: [{ duration, price, resellerPrice, stock }]
            });
            await CloudDB.updateProducts(products);
            showToast('Product Created Successfully!', 'success');
            openProductsModal();
        };

        const openAddPlanModal = (productId) => {
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm">Add Plan Duration</h3>
                    <button onclick="openProductsModal()" class="text-gray-400 hover:text-white p-1"><i class="fas fa-arrow-left"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1">Duration Title (e.g. 7 Days)</label>
                        <input type="text" id="ap-duration" placeholder="e.g. 7 Days" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs font-bold focus:outline-none">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[10px] text-gray-400 block mb-1">Buyer ₹</label><input type="number" id="ap-price" placeholder="349" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-3 text-white text-xs focus:outline-none"></div>
                        <div><label class="text-[10px] text-gray-400 block mb-1">Reseller ₹</label><input type="number" id="ap-reseller" placeholder="280" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-3 text-white text-xs focus:outline-none"></div>
                        <div><label class="text-[10px] text-gray-400 block mb-1">Stock</label><input type="number" id="ap-stock" value="100" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-2.5 py-3 text-white text-xs focus:outline-none"></div>
                    </div>
                    <button onclick="saveNewPlan('${productId}')" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3.5 rounded-xl shadow-lg mt-1 text-xs uppercase tracking-wider">Add Plan</button>
                </div>
            `);
        };

        const saveNewPlan = async (productId) => {
            const durInput = document.getElementById('ap-duration');
            const priceInput = document.getElementById('ap-price');
            const resellerInput = document.getElementById('ap-reseller');
            const stockInput = document.getElementById('ap-stock');
            if(!durInput) return;

            const duration = durInput.value.trim();
            const price = parseInt(priceInput.value);
            const resellerPrice = parseInt(resellerInput.value);
            const stock = parseInt(stockInput.value) || 100;

            if(!duration || isNaN(price) || isNaN(resellerPrice)) return showToast('Please enter valid duration & prices', 'error');

            const products = CloudDB.getProducts();
            const pIdx = products.findIndex(p => p.id === productId);
            if(pIdx > -1) {
                products[pIdx].plans.push({ duration, price, resellerPrice, stock });
                await CloudDB.updateProducts(products);
                showToast('Plan added successfully!', 'success');
                openProductsModal();
            }
        };

        const deletePlan = async (productId, planIndex) => {
            const products = CloudDB.getProducts();
            const pIdx = products.findIndex(p => p.id === productId);
            if(pIdx > -1) {
                if(products[pIdx].plans.length <= 1) return showToast('Product must have at least one plan', 'error');
                products[pIdx].plans.splice(planIndex, 1);
                await CloudDB.updateProducts(products);
                showToast('Plan removed', 'success');
                openProductsModal();
            }
        };

        const deleteProduct = async (id) => {
            let products = CloudDB.getProducts();
            products = products.filter(p => p.id !== id);
            await CloudDB.updateProducts(products);
            showToast('Product deleted', 'success');
            openProductsModal();
        };

        const saveProducts = async () => {
            const products = CloudDB.getProducts();
            products.forEach((p, pIndex) => {
                p.plans.forEach((plan, planIndex) => {
                    const durationInput = document.getElementById(`p_${pIndex}_${planIndex}_duration`);
                    const priceInput = document.getElementById(`p_${pIndex}_${planIndex}_price`);
                    const resellerInput = document.getElementById(`p_${pIndex}_${planIndex}_reseller`);
                    const stockInput = document.getElementById(`p_${pIndex}_${planIndex}_stock`);
                    
                    if(durationInput && durationInput.value.trim()) products[pIndex].plans[planIndex].duration = durationInput.value.trim();
                    if(priceInput && !isNaN(priceInput.value)) products[pIndex].plans[planIndex].price = parseInt(priceInput.value);
                    if(resellerInput && !isNaN(resellerInput.value)) products[pIndex].plans[planIndex].resellerPrice = parseInt(resellerInput.value);
                    if(stockInput && !isNaN(stockInput.value)) products[pIndex].plans[planIndex].stock = parseInt(stockInput.value);
                });
            });
            await CloudDB.updateProducts(products);
            closeModal();
            showToast('Products updated successfully!', 'success');
        };

        const openFilesModal = () => {
            const files = CloudDB.getFiles();
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm">Manage APK Files</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div class="bg-gray-950 border border-gray-800 p-4 rounded-2xl space-y-3">
                        <h4 class="text-[10px] font-bold text-green-400 uppercase tracking-wider"><i class="fas fa-plus-circle mr-1"></i> Add New File</h4>
                        <input type="text" id="new-f-name" placeholder="File Name (e.g. Config v2)" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3.5 py-2.5 text-white text-xs focus:outline-none">
                        <input type="text" id="new-f-ver" placeholder="Version (e.g. 1.5)" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3.5 py-2.5 text-white text-xs focus:outline-none">
                        <input type="url" id="new-f-link" placeholder="Download Link" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3.5 py-2.5 text-white text-xs focus:outline-none">
                        <button onclick="addNewFile()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2.5 rounded-xl font-bold text-xs w-full shadow-md uppercase tracking-wider">Publish File</button>
                    </div>
                    <div class="space-y-2 max-h-48 overflow-y-auto">
                        ${files.map(f => `
                            <div class="flex justify-between items-center bg-gray-950 border border-gray-800 p-3 rounded-xl">
                                <div><p class="text-xs text-white font-bold">${f.name}</p><p class="text-[10px] text-gray-500">Ver: ${f.version}</p></div>
                                <button onclick="deleteFile('${f.id}')" class="text-red-400 p-2 bg-gray-900 rounded-xl"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        };

        const addNewFile = async () => {
            const nameInput = document.getElementById('new-f-name');
            const verInput = document.getElementById('new-f-ver');
            const linkInput = document.getElementById('new-f-link');
            if(!nameInput || !linkInput) return;

            const name = nameInput.value.trim();
            const version = verInput ? verInput.value.trim() : '1.0';
            const link = linkInput.value.trim();
            if(!name || !link) return showToast('Name and Link required', 'error');

            const newFile = { id: generateId(), name, version: version || '1.0', link };
            await CloudDB.addFile(newFile);
            showToast('File Published!', 'success');
            openFilesModal();
        };

        const deleteFile = async (id) => {
            await CloudDB.deleteFile(id);
            showToast('File Deleted', 'success');
            openFilesModal();
        };

        const openSupportSettings = () => {
            const support = CloudDB.getSupport();
            openModal(`
                <div class="p-4 border-b border-gray-800 bg-gray-900 rounded-t-3xl flex justify-between items-center">
                    <h3 class="font-bold text-white text-sm">Edit Support Details</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white p-1"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Telegram Username</label>
                        <input type="text" id="sup-tg" value="${support.telegram}" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">WhatsApp Number</label>
                        <input type="text" id="sup-wa" value="${support.whatsapp}" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Support Notice / Message</label>
                        <textarea id="sup-msg" rows="3" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white text-xs focus:outline-none resize-none">${support.message}</textarea>
                    </div>
                    <button onclick="saveSupport()" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-bold py-3.5 rounded-xl shadow-lg text-xs uppercase tracking-wider">Save Support Details</button>
                </div>
            `);
        };

        const saveSupport = async () => {
            const tg = document.getElementById('sup-tg').value;
            const wa = document.getElementById('sup-wa').value;
            const msg = document.getElementById('sup-msg').value;
            await CloudDB.updateSupport({ telegram: tg, whatsapp: wa, message: msg });
            closeModal();
            showToast('Support details saved!', 'success');
        };

        const renderAppFrame = () => {
            return `
                <div class="flex-1 overflow-y-auto p-4 md:p-6 pb-24" id="main-content"></div>
                <div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 z-40">
                    <div class="flex justify-around items-center h-16 max-w-md mx-auto">
                        <button onclick="setTab('store')" class="flex flex-col items-center justify-center w-16 h-full text-gray-400 hover:text-white ${currentTab==='store'?'text-blue-500 font-bold':''}">
                            <i class="fas fa-store text-lg mb-1"></i><span class="text-[10px]">Store</span>
                        </button>
                        <button onclick="setTab('history')" class="flex flex-col items-center justify-center w-16 h-full text-gray-400 hover:text-white ${currentTab==='history'?'text-blue-500 font-bold':''}">
                            <i class="fas fa-history text-lg mb-1"></i><span class="text-[10px]">History</span>
                        </button>
                        <button onclick="setTab('files')" class="flex flex-col items-center justify-center w-16 h-full text-gray-400 hover:text-white ${currentTab==='files'?'text-blue-500 font-bold':''}">
                            <i class="fas fa-folder-open text-lg mb-1"></i><span class="text-[10px]">Files</span>
                        </button>
                        <button onclick="setTab('account')" class="flex flex-col items-center justify-center w-16 h-full text-gray-400 hover:text-white ${currentTab==='account'?'text-blue-500 font-bold':''}">
                            <i class="fas fa-user-circle text-lg mb-1"></i><span class="text-[10px]">Account</span>
                        </button>
                        ${currentUser && currentUser.role === 'owner' ? `
                        <button onclick="setTab('admin')" class="flex flex-col items-center justify-center w-16 h-full text-gray-400 hover:text-white ${currentTab==='admin'?'text-blue-500 font-bold':''}">
                            <i class="fas fa-shield-alt text-lg mb-1"></i><span class="text-[10px]">Admin</span>
                        </button>` : ''}
                    </div>
                </div>
            `;
        };

        const renderLoginScreen = () => {
            const support = CloudDB.getSupport();
            return `
                <div class="flex-1 flex items-center justify-center p-4 bg-gray-950 fade-in overflow-y-auto">
                    <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl w-full max-w-sm my-auto">
                        <div class="text-center mb-6">
                            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 transform rotate-6">
                                <i class="fas fa-key text-white text-2xl transform -rotate-6"></i>
                            </div>
                            <h1 class="text-2xl font-black text-white tracking-tight">UNION STORE</h1>
                            <p class="text-[11px] text-gray-500 mt-1 font-medium">Realtime Cloud Game Licenses</p>
                        </div>
                        
                        <form onsubmit="login(event)" class="space-y-3.5">
                            <div class="relative">
                                <i class="fas fa-user absolute left-4 top-3.5 text-gray-500 text-xs"></i>
                                <input type="text" id="login-user" required placeholder="Username" class="w-full bg-gray-950 border border-gray-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white focus:border-blue-500 focus:outline-none">
                            </div>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500 text-xs"></i>
                                <input type="password" id="login-pass" required placeholder="Password" class="w-full bg-gray-950 border border-gray-800 rounded-xl pl-10 pr-4 py-3 text-xs text-white focus:border-blue-500 focus:outline-none">
                            </div>
                            <div class="text-right">
                                <button type="button" onclick="showForgotPasswordModal()" class="text-[11px] text-blue-400 hover:underline">Forgot Password?</button>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform text-xs uppercase tracking-wider">Sign In</button>
                        </form>

                        <div class="mt-5 pt-4 border-t border-gray-800">
                            <p class="text-[10px] text-gray-400 text-center mb-2 font-medium">Need Assistance? Contact Support</p>
                            <div class="flex gap-2">
                                <a href="https://t.me/${support.telegram.replace('@', '')}" target="_blank" class="flex-1 bg-gray-950 border border-gray-800 hover:border-blue-500 text-blue-400 py-2.5 rounded-xl text-[11px] font-bold flex items-center justify-center gap-1.5 transition-colors">
                                    <i class="fab fa-telegram text-xs"></i> Telegram
                                </a>
                                <a href="https://wa.me/${support.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" class="flex-1 bg-gray-950 border border-gray-800 hover:border-green-500 text-green-400 py-2.5 rounded-xl text-[11px] font-bold flex items-center justify-center gap-1.5 transition-colors">
                                    <i class="fab fa-whatsapp text-xs"></i> WhatsApp
                                </a>
                            </div>
                        </div>
                        
                        <div class="mt-5 pt-4 border-t border-gray-800">
                            <p class="text-[11px] text-gray-500 text-center mb-2 font-medium">Create New Account</p>
                            <form onsubmit="register(event)" class="flex gap-2">
                                <input type="text" id="reg-user" required placeholder="Username" class="w-1/2 bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none">
                                <input type="password" id="reg-pass" required placeholder="Password" class="w-1/2 bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none">
                                <button type="submit" class="bg-gray-800 hover:bg-gray-700 text-white rounded-xl px-3.5 py-2.5 text-xs font-bold">Join</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;
        };

        const render = () => {
            const container = document.getElementById('app-container');
            if(!container) return;
            if (!currentUser) {
                container.innerHTML = renderLoginScreen();
            } else {
                refreshUserData();
                if(!document.getElementById('main-content')) {
                    container.innerHTML = renderAppFrame();
                }
                const main = document.getElementById('main-content');
                if(main) {
                    if(currentTab === 'store') main.innerHTML = renderStore();
                    else if(currentTab === 'history') main.innerHTML = renderHistory();
                    else if(currentTab === 'files') main.innerHTML = renderFiles();
                    else if(currentTab === 'account') main.innerHTML = renderAccount();
                    else if(currentTab === 'admin') main.innerHTML = renderAdmin();
                }
            }
        };

        window.onload = function() {
            if (!currentTab) currentTab = 'store';
            render();
        };
    </script>
</body>
</html>
